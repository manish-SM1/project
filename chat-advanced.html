<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Advanced AI Chat — CareerAI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      .chat-container {
        max-width: 900px;
        margin: 2rem auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        height: calc(100vh - 200px);
      }

      .chat-header {
        padding: 1.5rem;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .chat-header h2 {
        margin: 0;
        font-size: 1.5rem;
        color: #1a202c;
      }

      .chat-controls {
        display: flex;
        gap: 0.5rem;
      }

      .chat-log {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        background: #f7fafc;
      }

      .message {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
        animation: fadeIn 0.3s ease-in;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .message.user {
        align-items: flex-end;
      }

      .message.assistant {
        align-items: flex-start;
      }

      .message-role {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
        color: #718096;
        letter-spacing: 0.05em;
      }

      .message-bubble {
        max-width: 75%;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        line-height: 1.6;
        position: relative;
      }

      .message.user .message-bubble {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .message.assistant .message-bubble {
        background: white;
        color: #1a202c;
        border: 1px solid #e2e8f0;
      }

      .message-bubble pre {
        background: #2d3748;
        color: #e2e8f0;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        margin: 0.5rem 0;
      }

      .message-bubble code {
        background: #2d3748;
        color: #e2e8f0;
        padding: 0.2rem 0.4rem;
        border-radius: 3px;
        font-size: 0.9em;
        font-family: 'Courier New', monospace;
      }

      .message-bubble ul, .message-bubble ol {
        margin: 0.5rem 0;
        padding-left: 1.5rem;
      }

      .message-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .message:hover .message-actions {
        opacity: 1;
      }

      .message-actions button {
        background: none;
        border: 1px solid #cbd5e0;
        color: #4a5568;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.75rem;
        transition: all 0.2s;
      }

      .message-actions button:hover {
        background: #edf2f7;
        border-color: #a0aec0;
      }

      .message-actions button.active {
        background: #48bb78;
        color: white;
        border-color: #48bb78;
      }

      .message-actions button.negative {
        background: #f56565;
        color: white;
        border-color: #f56565;
      }

      .message-sources {
        margin-top: 0.5rem;
        padding: 0.5rem;
        background: #edf2f7;
        border-radius: 6px;
        font-size: 0.85rem;
        color: #4a5568;
      }

      .message-sources strong {
        display: block;
        margin-bottom: 0.25rem;
        color: #2d3748;
      }

      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem 1.25rem;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        max-width: 75%;
      }

      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #cbd5e0;
        border-radius: 50%;
        animation: typing 1.4s infinite;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-10px); }
      }

      .chat-input-area {
        padding: 1.5rem;
        border-top: 1px solid #e2e8f0;
        background: white;
      }

      .chat-input-wrapper {
        display: flex;
        gap: 0.75rem;
        align-items: flex-end;
      }

      .chat-input {
        flex: 1;
        padding: 0.875rem 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        resize: none;
        min-height: 50px;
        max-height: 150px;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      .chat-input:focus {
        outline: none;
        border-color: #667eea;
      }

      .send-button {
        padding: 0.875rem 2rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .send-button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .send-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .settings-panel {
        display: none;
        padding: 1rem;
        background: #f7fafc;
        border-bottom: 1px solid #e2e8f0;
      }

      .settings-panel.active {
        display: block;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }

      .setting-item label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 0.25rem;
      }

      .setting-item select,
      .setting-item input {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        font-size: 0.875rem;
      }

      .btn-icon {
        padding: 0.5rem;
        background: #edf2f7;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1.25rem;
      }

      .btn-icon:hover {
        background: #e2e8f0;
      }

      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .status-badge.online {
        background: #c6f6d5;
        color: #22543d;
      }

      .status-badge.offline {
        background: #fed7d7;
        color: #742a2a;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a href="index.html" class="brand">Career<span>AI</span></a>
        <nav class="site-nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="profile.html">Profile</a>
          <a href="recommendations.html">Recommendations</a>
          <a href="chat-advanced.html" class="active">AI Chat</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <div class="chat-container">
        <div class="chat-header">
          <div>
            <h2>🤖 Advanced AI Assistant</h2>
            <span id="status-badge" class="status-badge offline">Connecting...</span>
          </div>
          <div class="chat-controls">
            <button class="btn-icon" id="settings-btn" title="Settings">⚙️</button>
            <button class="btn-icon" id="clear-btn" title="Clear conversation">🗑️</button>
          </div>
        </div>

        <div class="settings-panel" id="settings-panel">
          <div class="settings-grid">
            <div class="setting-item">
              <label>Persona</label>
              <select id="persona-select">
                <option value="professional" selected>Professional</option>
                <option value="friendly">Friendly</option>
                <option value="mentor">Mentor</option>
              </select>
            </div>
            <div class="setting-item">
              <label>Temperature (Creativity)</label>
              <input type="range" id="temperature-slider" min="0" max="1" step="0.1" value="0.7">
              <span id="temperature-value">0.7</span>
            </div>
            <div class="setting-item">
              <label>Max Response Length</label>
              <select id="max-tokens-select">
                <option value="400">Short (400)</option>
                <option value="800" selected>Medium (800)</option>
                <option value="1200">Long (1200)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="chat-log" id="chat-log">
          <!-- Messages will be appended here -->
        </div>

        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <textarea 
              id="chat-input" 
              class="chat-input"
              placeholder="Ask me about careers, learning paths, technologies..."
              rows="1"
            ></textarea>
            <button id="send-button" class="send-button">Send</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrap"><small>© 2025 CareerAI - Advanced AI-Powered Career Guidance</small></div>
    </footer>

    <script src="common.js"></script>
    <script src="chat-advanced.js"></script>
  </body>
</html>
