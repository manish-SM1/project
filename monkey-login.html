<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerAI - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/monkey-login.css">
</head>
<body>
    <!-- Animated Background Text -->
    <div class="background-text">
        <div class="sliding-text top">CareerAI</div>
        <div class="sliding-text right">CareerAI</div>
        <div class="sliding-text bottom">CareerAI</div>
        <div class="sliding-text left">CareerAI</div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <!-- Monkey Animation -->
            <div class="monkey">
                <div class="head">
                    <div class="ear ear-left"></div>
                    <div class="ear ear-right"></div>
                    <div class="face">
                        <div class="eyes">
                            <div class="eye eye-left">
                                <div class="pupil"></div>
                            </div>
                            <div class="eye eye-right">
                                <div class="pupil"></div>
                            </div>
                        </div>
                        <div class="nose"></div>
                        <div class="mouth"></div>
                    </div>
                </div>
                <div class="hands">
                    <div class="hand hand-left"></div>
                    <div class="hand hand-right"></div>
                </div>
            </div>

            <!-- Login Form -->
            <div class="form">
                <h2 class="form-title">Welcome to <span class="brand">CareerAI</span></h2>
                <div class="control">
                    <label for="email" class="fa fa-envelope"></label>
                    <input id="email" placeholder="Email" type="email" autocomplete="email">
                </div>
                <div class="control">
                    <label for="password" class="fa fa-lock"></label>
                    <input id="password" placeholder="Password" type="password" autocomplete="current-password">
                </div>
                <button class="login-btn">
                    <span>Login</span>
                    <i class="fa fa-arrow-right"></i>
                </button>
                <div class="form-footer">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/monkey-login.js"></script>
</body>
</html>
